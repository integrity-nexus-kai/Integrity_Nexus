name: Claim Boundary Guard

on:
  pull_request:
    paths:
      - 'foundation/**/*.md'
      - 'registry/**/*.md'
      - 'governance/**/*.md'
      - 'operations/**/*.md'
      - 'domains/**/*.md'
      - 'research/**/*.md'
      - 'docs/**/*.md'
      - 'papers/**/*.md'
  push:
    branches:
      - main
    paths:
      - 'foundation/**/*.md'
      - 'registry/**/*.md'
      - 'governance/**/*.md'
      - 'operations/**/*.md'
      - 'domains/**/*.md'
      - 'research/**/*.md'
      - 'docs/**/*.md'
      - 'papers/**/*.md'

jobs:
  claim-boundary-guard:
    name: Claim Boundary Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed markdown files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > all_changed_files.txt
          grep -E '^(foundation|registry|governance|operations|domains|research|docs|papers)/.*\.md$' all_changed_files.txt > changed_markdown_files.txt || true

      - name: Check claim boundary language
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s changed_markdown_files.txt ]]; then
            echo "No relevant markdown files changed."
            exit 0
          fi

          RISK_PATTERN='\b(proves|proven|final|complete|completed|solves|solved|derived|derives|establishes|established|fundamental|physical|canonical)\b'
          SAFE_PATTERN='candidate|partial|open|needs|audit|review|blocked|non-claim|does not|not yet|scope|boundary|working assumption|effective|operational'

          while IFS= read -r file; do
            [[ -f "$file" ]] || continue
            echo "Checking $file"

            if grep -Ein "$RISK_PATTERN" "$file" > claim_risk_hits.txt; then
              echo "::warning file=$file::Potential claim-boundary escalation language detected. Review whether wording is supported by status and evidence."
              cat claim_risk_hits.txt

              if ! grep -Eiq "$SAFE_PATTERN" "$file"; then
                echo "::warning file=$file::Risk terms detected without obvious local boundary language."
              fi
            fi
          done < changed_markdown_files.txt

          echo "Phase 1 warning-only claim-boundary check complete."
          exit 0
